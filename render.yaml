services:
  - type: worker
    name: ai-influencer-bot
    env: python
    buildCommand: |
      pip install python-telegram-bot beautifulsoup4 feedparser Pillow scikit-learn numpy joblib requests
    startCommand: python ai_influencer_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

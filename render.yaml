services:
  - type: web
    name: openshorts-fitness-bot
    runtime: image
    repo: https://github.com/opentechfund/openshorts
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
